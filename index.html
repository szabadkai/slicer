<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SliceLab</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div id="app">
    <header id="toolbar">
      <div id="toolbar-left">
        <div class="logo">SliceLab</div>
      </div>
      <div id="toolbar-right">
        <select id="printer-select" class="val-box" style="margin-right: 10px;"></select>
      </div>
    </header>

    <main id="workspace">
      <aside id="left-toolbar">
        <div class="toolbar-group">
          <label id="load-btn" class="tool-btn" title="Load Model">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
            <span>Load</span>
            <input type="file" id="stl-input" accept=".stl" hidden>
          </label>
          <button class="tool-btn active" id="edit-btn" title="Prepare">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M4 4h16v4H4V4zm0 6h16v4H4v-4zm0 6h10v4H4v-4z" />
            </svg>
            <span>Prepare</span>
          </button>
          <button class="tool-btn" id="transform-btn" title="Transform">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2L8 6h3v5H6V8L2 12l4 4v-3h5v5H8l4 4 4-4h-3v-5h5v3l4-4-4-4v3h-5V6h3z" />
            </svg>
            <span>Transform</span>
          </button>
          <button class="tool-btn" id="orient-btn" title="Orient">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z" />
            </svg>
            <span>Orient</span>
          </button>
          <button class="tool-btn" id="support-tool-btn" title="Supports">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M3 3h18v18H3zM5 5v14h14V5zm2 2h4v4H7zm6 0h4v4h-4zm-6 6h4v4H7zm6 0h4v4h-4z" />
            </svg>
            <span>Supports</span>
          </button>
          <button class="tool-btn" id="material-btn" title="Material">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M12 2C8.1 2 5 5.1 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.9-3.1-7-7-7zm0 10.5A3.5 3.5 0 1 1 12 5a3.5 3.5 0 0 1 0 7.5z" />
            </svg>
            <span>Material</span>
          </button>
          <button class="tool-btn" id="slice-tool-btn" title="Slice">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M4 5h16v2H4V5zm2 4h12v2H6V9zm2 4h8v2H8v-2zm2 4h4v2h-4v-2z" />
            </svg>
            <span>Slice</span>
          </button>
        </div>
      </aside>

      <div id="viewport-container">
        <canvas id="viewport"></canvas>
        <div id="fps-counter">FPS --</div>
        <div id="model-info" class="floating-panel"></div>
        <div id="summary-panel" class="floating-panel">
          <h3>Summary</h3>
          <div id="print-estimate">No active slice</div>
        </div>
      </div>

      <aside id="sidebar">
        <section id="transform-panel" class="panel" hidden>
          <h2>Transform</h2>
          <div class="mode-toggles">
            <button class="btn mode-btn active" data-mode="translate">Move</button>
            <button class="btn mode-btn" data-mode="scale">Size</button>
            <button class="btn mode-btn" data-mode="rotate">Rotate</button>
          </div>
          <div id="transform-move-fields" class="transform-fields">
            <div class="control-group">
              <label>X (mm) <input type="number" id="move-x" value="0" step="1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Y (mm) <input type="number" id="move-y" value="0" step="1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Z (mm) <input type="number" id="move-z" value="0" step="1" class="val-box"></label>
            </div>
          </div>
          <div id="transform-scale-fields" class="transform-fields" hidden>
            <div class="control-group">
              <label>Uniform <input type="checkbox" id="uniform-scale" checked class="val-box"></label>
            </div>
            <h3 class="field-heading">Relative</h3>
            <div class="control-group">
              <label>X % <input type="number" id="scale-x" value="100" min="1" step="1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Y % <input type="number" id="scale-y" value="100" min="1" step="1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Z % <input type="number" id="scale-z" value="100" min="1" step="1" class="val-box"></label>
            </div>
            <h3 class="field-heading">Dimensions</h3>
            <div class="control-group">
              <label>Width X (mm) <input type="number" id="size-x" value="0" min="0.01" step="0.1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Height Y (mm) <input type="number" id="size-y" value="0" min="0.01" step="0.1" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Depth Z (mm) <input type="number" id="size-z" value="0" min="0.01" step="0.1" class="val-box"></label>
            </div>
          </div>
          <div id="transform-rotate-fields" class="transform-fields" hidden>
            <div class="control-group">
              <label>X (&deg;) <input type="number" id="rotate-x" value="0" step="5" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Y (&deg;) <input type="number" id="rotate-y" value="0" step="5" class="val-box"></label>
            </div>
            <div class="control-group">
              <label>Z (&deg;) <input type="number" id="rotate-z" value="0" step="5" class="val-box"></label>
            </div>
          </div>
          <h3 class="field-heading">Build Plate</h3>
          <div class="control-group">
            <label>Z Elevation (mm)
              <input type="number" id="z-elevation" value="5" min="0" max="50" step="1" class="val-box">
            </label>
          </div>
        </section>

        <section id="orientation-panel" class="panel" hidden>
          <h2>Orientation</h2>
          <div class="preset-buttons">
            <div tabindex="0" class="btn preset-btn" data-preset="fastest">
              <img src="/fastest.png" alt="Fastest">
              <span>Fastest</span>
            </div>
            <div tabindex="0" class="btn preset-btn" data-preset="least-support">
              <img src="/least-support.png" alt="Least Support">
              <span>Least Support</span>
            </div>
            <div tabindex="0" class="btn preset-btn" data-preset="best-quality">
              <img src="/best-quality.png" alt="Best Quality">
              <span>Best Quality</span>
            </div>
          </div>
          <div class="action-buttons" style="margin-top: 12px;">
            <button class="btn btn-primary" id="orient-all-btn" style="width: 100%;">Orient All</button>
          </div>
        </section>

        <section id="supports-panel" class="panel" hidden>
          <h2>Supports <span class="badge">Auto</span></h2>
          <div class="control-group">
            <label>Overhang Angle</label>
            <div class="flex-row">
              <input type="range" id="overhang-angle" min="10" max="60" value="30">
              <span id="overhang-angle-val" class="val-box">30&deg;</span>
            </div>
          </div>
          <div class="control-group">
            <label>Auto Density
              <input type="checkbox" id="auto-density" checked class="val-box">
            </label>
          </div>
          <div class="control-group" id="support-density-group" style="opacity: 0.5; pointer-events: none;">
            <label>Support Density</label>
            <div class="flex-row">
              <input type="range" id="support-density" min="1" max="10" value="5" disabled>
              <span id="support-density-val" class="val-box">5</span>
            </div>
          </div>
          <div class="control-group">
            <label>Auto Thickness
              <input type="checkbox" id="auto-thickness" checked class="val-box">
            </label>
          </div>
          <div class="control-group" id="tip-diameter-group" style="opacity: 0.5; pointer-events: none;">
            <label>Tip Diameter (mm)
              <input type="number" id="tip-diameter" value="0.4" min="0.1" max="2" step="0.1" class="val-box" disabled>
            </label>
          </div>
          <div class="control-group" id="support-thickness-group" style="opacity: 0.5; pointer-events: none;">
            <label>Support Thickness (mm)
              <input type="number" id="support-thickness" value="0.8" min="0.2" max="5" step="0.1" class="val-box"
                disabled>
            </label>
          </div>
          <div class="control-group">
            <label>Solid Base Pan
              <input type="checkbox" id="base-pan-enabled" class="val-box">
            </label>
          </div>
          <div id="base-pan-options" style="opacity: 0.5; pointer-events: none;">
            <div class="control-group">
              <label>Pan Margin (mm)
                <input type="number" id="base-pan-margin" value="4" min="0" max="30" step="0.5" class="val-box" disabled>
              </label>
            </div>
            <div class="control-group">
              <label>Pan Thickness (mm)
                <input type="number" id="base-pan-thickness" value="0.8" min="0.2" max="5" step="0.1" class="val-box" disabled>
              </label>
            </div>
            <div class="control-group">
              <label>Lip Width (mm)
                <input type="number" id="base-pan-lip-width" value="1.2" min="0.4" max="5" step="0.1" class="val-box" disabled>
              </label>
            </div>
            <div class="control-group">
              <label>Lip Height (mm)
                <input type="number" id="base-pan-lip-height" value="1" min="0.2" max="6" step="0.1" class="val-box" disabled>
              </label>
            </div>
          </div>
          <details class="advanced-group">
            <summary>Advanced Support Routing</summary>
            <div class="control-group">
              <label>Support Scope
                <select id="support-scope" class="val-box">
                  <option value="outside-only" selected>Outside only</option>
                  <option value="all">Include cavities</option>
                </select>
              </label>
            </div>
            <div class="control-group">
              <label>Approach
                <select id="support-approach" class="val-box">
                  <option value="angled-needed">Angle when needed</option>
                  <option value="vertical">Vertical only</option>
                  <option value="prefer-angled" selected>Prefer angled</option>
                </select>
              </label>
            </div>
            <div class="control-group">
              <label>Max Pillar Angle (deg)
                <input type="number" id="support-max-angle" value="45" min="5" max="70" step="5" class="val-box">
              </label>
            </div>
            <div class="control-group">
              <label>Model Clearance (mm)
                <input type="number" id="support-clearance" value="1.5" min="0.2" max="10" step="0.1" class="val-box">
              </label>
            </div>
            <div class="control-group">
              <label>Max Contact Offset (mm)
                <input type="number" id="support-max-offset" value="18" min="1" max="80" step="1" class="val-box">
              </label>
            </div>
            <div class="control-group">
              <label>Cross Bracing
                <input type="checkbox" id="cross-bracing" checked class="val-box">
              </label>
            </div>
          </details>
          <div class="action-buttons">
            <button class="btn btn-secondary" id="clear-supports-btn">Clear</button>
            <button class="btn btn-primary" id="generate-supports-btn">Auto-Generate</button>
          </div>
          <div class="action-buttons" style="margin-top: 4px;">
            <button class="btn btn-primary" id="support-all-btn" style="width: 100%;">Support All</button>
          </div>
        </section>

        <section id="edit-panel" class="panel" hidden>
          <h2>Prepare</h2>
          <div class="edit-actions">
            <button class="btn btn-secondary edit-action-btn" id="duplicate-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
              </svg>
              Duplicate
            </button>
            <button class="btn btn-secondary edit-action-btn" id="fill-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M2 2h20v20H2V2zm2 2v4h4V4H4zm6 0v4h4V4h-4zm6 0v4h4V4h-4zM4 10v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4zM4 16v4h4v-4H4zm6 0v4h4v-4h-4zm6 0v4h4v-4h-4z" />
              </svg>
              Fill Platform
            </button>
            <button class="btn edit-action-btn edit-action-danger" id="delete-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
              </svg>
              Delete Selected
            </button>
            <button class="btn edit-action-btn edit-action-danger" id="clear-btn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z" />
              </svg>
              Clear All
            </button>
          </div>
        </section>

        <section id="materials-panel" class="panel" hidden>
          <h2>Resin Material <span class="badge">Preview</span></h2>
          <div id="material-picker" class="material-grid"></div>
          <div id="material-detail" class="material-detail"></div>
          <div class="action-buttons" style="margin-top: 12px;">
            <button class="btn btn-secondary" id="apply-material-all-btn">Apply to All</button>
          </div>
        </section>

        <section id="slice-panel" class="panel" hidden>
          <h2>Slice</h2>
          <div class="control-group">
            <label>Layer Height (mm)
              <input type="number" id="layer-height" value="0.05" min="0.01" max="0.15" step="0.01" class="val-box">
            </label>
          </div>
          <div class="control-group">
            <label>Normal Exposure (s)
              <input type="number" id="normal-exposure" value="2" min="0.5" max="20" step="0.5" class="val-box">
            </label>
          </div>
          <div class="control-group">
            <label>Bottom Layers
              <input type="number" id="bottom-layers" value="6" min="1" max="20" step="1" class="val-box">
            </label>
          </div>
          <div class="control-group">
            <label>Bottom Exposure (s)
              <input type="number" id="bottom-exposure" value="60" min="10" max="120" step="5" class="val-box">
            </label>
          </div>
          <div class="control-group">
            <label>Lift Height (mm)
              <input type="number" id="lift-height" value="5" min="1" max="15" step="0.5" class="val-box">
            </label>
          </div>
          <div class="control-group">
            <label>Lift Speed (mm/s)
              <input type="number" id="lift-speed" value="1" min="0.5" max="5" step="0.5" class="val-box">
            </label>
          </div>
        </section>

        <section id="layer-preview-panel" class="panel" hidden>
          <h2>Layer Preview</h2>
          <canvas id="layer-canvas"></canvas>
          <div class="control-group">
            <input type="range" id="layer-slider" min="0" max="0" value="0">
            <span id="layer-info" class="val-box">0 / 0</span>
          </div>
        </section>

        <div id="footer-actions" hidden>
          <button class="btn btn-primary slice-big-btn" id="slice-btn">Slice & Print</button>
          <button class="btn export-btn" id="export-btn" hidden>Export ZIP</button>
        </div>
      </aside>
    </main>
  </div>

  <div id="context-menu" class="context-menu" hidden>
    <div class="context-menu-label">Export plate mesh</div>
    <button type="button" class="context-menu-item" data-export-format="stl">STL</button>
    <button type="button" class="context-menu-item" data-export-format="3mf">3MF</button>
    <button type="button" class="context-menu-item" data-export-format="obj">OBJ</button>
  </div>

  <div id="progress-overlay" hidden>
    <div id="progress-box">
      <div id="progress-text">Slicing...</div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-percent">0%</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
